<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/css.css">
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <title>Fighting Game</title>
</head>
<body>
    <!-- Startscherm -->
    <div id="startscherm">
        <h1>The Fighting Tournament</h1>

        <div class="controls">
            <div class="speler">
                <h2>Speler 1</h2>
                <p>Bewegen: A / D</p>
                <p>Springen: W</p>
                <p>Aanvallen: Spatie</p>
            </div>
            <div class="speler">
                <h2>Speler 2</h2>
                <p>Bewegen: ← / →</p>
                <p>Springen: ↑</p>
                <p>Aanvallen: Enter</p>
            </div>
        </div>

        <button id="startknop"><a href="character-select.html">Start</a></button>
        <button id="shopknop"><a href="shop.html">Shop</a></button>
        <p class="hint">of druk op een toets</p>
    </div>

</body>
</html>
